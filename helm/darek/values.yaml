replicaCount: 1

# When false, the chart references an externally-created ServiceAccount
# (Vault auth role binds to a SA name terraform owns).
serviceAccount:
  create: false
  name: "darek-sa"

# When external-secrets manages the env Secret, set this to false and ensure
# an ExternalSecret materializes a Secret named `<fullname>-env`.
envSecret:
  create: false

image:
  repository: bartlomiejklimczak/darek
  pullPolicy: IfNotPresent
  tag: "v0.1.0"

service:
  type: ClusterIP
  port: 7777

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: darek.klimczak.xyz
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - darek.klimczak.xyz
      secretName: darek-tls

# Persistent volume for ~/.darek/oauth (Google Calendar refresh tokens) and
# ~/.darek/attachments (mail body cache). Mounted RWO; both serve and the
# daily-digest CronJob reference the same claim — single-node k3s, brief
# CronJob runtime, no contention in practice.
persistence:
  enabled: true
  storageClass: "local-path"
  accessMode: ReadWriteOnce
  size: 1Gi

# Daily calendar digest cron. Schedule is in the CronJob's TZ field below.
dailyDigest:
  enabled: true
  schedule: "0 7 * * *"
  timeZone: "Europe/Warsaw"

# DB migrations are run as a Helm pre-install/pre-upgrade Job.
migrations:
  enabled: true

# Inline darek config.yaml. Rendered into a ConfigMap. Env vars referenced
# by `*_env` keys come from the Secret below.
config: |
  openai:
    model: gpt-4.1
    api_key_env: DAREK_OPENAI_API_KEY

  postgres:
    url_env: DAREK_POSTGRES_URL

  otel:
    service_name: darek
    exporter_endpoint: alloy.alloy.svc.cluster.local:4317
    insecure: true

  agent:
    max_iterations: 10
    llm_timeout: 60s
    tool_timeout: 30s

  memory:
    pgvector: false
    embedding_model: text-embedding-3-small

  server:
    bind: "0.0.0.0:7777"

resources: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 20
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
affinity: {}
tolerations: []
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
imagePullSecrets: []
