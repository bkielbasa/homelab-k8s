{{- if .Values.dailyDigest.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "darek.fullname" . }}-daily-digest
  labels:
    {{- include "darek.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.dailyDigest.schedule | quote }}
  timeZone: {{ .Values.dailyDigest.timeZone | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          annotations:
            # Linkerd sidecar never exits, blocks the Pod from reaching
            # Completed state and the Job is marked Failed. Cron-style work
            # gets no mesh — east-west traffic from this pod is direct.
            linkerd.io/inject: disabled
          labels:
            {{- include "darek.selectorLabels" . | nindent 12 }}
            job: daily-digest
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "darek.serviceAccountName" . }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: daily-digest
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args: ["calendar", "daily-digest"]
              envFrom:
                - secretRef:
                    name: {{ include "darek.fullname" . }}-env
              env:
                - name: HOME
                  value: /home/nonroot
              volumeMounts:
                - name: config
                  mountPath: /home/nonroot/.darek/config.yaml
                  subPath: config.yaml
                  readOnly: true
                {{- if .Values.persistence.enabled }}
                - name: data
                  mountPath: /home/nonroot/.darek/data
                {{- end }}
          volumes:
            - name: config
              configMap:
                name: {{ include "darek.fullname" . }}-config
            {{- if .Values.persistence.enabled }}
            - name: data
              persistentVolumeClaim:
                claimName: {{ include "darek.fullname" . }}-data
            {{- end }}
{{- end }}
