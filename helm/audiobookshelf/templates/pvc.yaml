{{- if .Values.persistence.config.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "audiobookshelf.fullname" . }}-config
  labels:
    {{- include "audiobookshelf.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.config.accessMode | quote }}
  storageClassName: {{ .Values.persistence.config.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.config.size | quote }}
{{- end }}
---
{{- if .Values.persistence.metadata.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "audiobookshelf.fullname" . }}-metadata
  labels:
    {{- include "audiobookshelf.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.metadata.accessMode | quote }}
  storageClassName: {{ .Values.persistence.metadata.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.metadata.size | quote }}
{{- end }}
---
{{- if .Values.persistence.audiobooks.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "audiobookshelf.fullname" . }}-audiobooks
  labels:
    {{- include "audiobookshelf.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.audiobooks.accessMode | quote }}
  storageClassName: {{ .Values.persistence.audiobooks.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.audiobooks.size | quote }}
{{- end }}
