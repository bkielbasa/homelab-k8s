replicaCount: 1

image:
  repository: ghcr.io/advplyr/audiobookshelf
  pullPolicy: IfNotPresent
  tag: "2.19.4"

service:
  type: ClusterIP
  port: 80

persistence:
  config:
    enabled: true
    storageClass: "qnap-nfs"
    accessMode: ReadWriteOnce
    size: 1Gi
  metadata:
    enabled: true
    storageClass: "qnap-nfs"
    accessMode: ReadWriteOnce
    size: 5Gi
  audiobooks:
    enabled: true
    storageClass: "qnap-nfs"
    accessMode: ReadWriteOnce
    size: 50Gi

ingress:
  enabled: false

restartPolicy: Always
