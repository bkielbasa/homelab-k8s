apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "freshrss.fullname" . }}
  labels:
    {{- include "freshrss.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "freshrss.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "freshrss.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: freshrss-sa
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.persistence.enabled .Values.oidc.enabled }}
      # Re-assert web-server (OIDC) auth on every start. The image only sets
      # auth_type via FRESHRSS_INSTALL, which no-ops on an existing install, so a
      # FreshRSS upgrade can silently reset auth_type to 'form' and break SSO
      # (as happened 2026-04-20). This keeps http_auth pinned declaratively.
      initContainers:
        - name: ensure-http-auth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - sh
            - -c
            - |
              cfg=/var/www/FreshRSS/data/config.php
              if [ -f "$cfg" ]; then
                sed -i "s/'auth_type' => 'form'/'auth_type' => 'http_auth'/" "$cfg"
                echo "ensure-http-auth: auth_type pinned to http_auth"
              else
                echo "ensure-http-auth: no config.php yet (fresh install), skipping"
              fi
          volumeMounts:
            - name: freshrss-data
              mountPath: /var/www/FreshRSS/data
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: freshrss-data
              mountPath: /var/www/FreshRSS/data
          {{- end }}
          env:
            - name: KUBERNETES_SERVICE_HOST
              value: "kubernetes.default.svc"
            - name: KUBERNETES_SERVICE_PORT
              value: "443"
            - name: CRON_MIN
              value: "13,43"
            - name: TZ
              value: "Europe/Warsaw"
            {{- if .Values.oidc.enabled }}
            - name: OIDC_ENABLED
              value: "1"
            - name: OIDC_PROVIDER_METADATA_URL
              value: {{ .Values.oidc.providerMetadataUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.secretName | default "freshrss-oidc" | quote }}
                  key: {{ .Values.oidc.secretKey | default "clientSecret" | quote }}
            - name: OIDC_X_FORWARDED_HEADERS
              value: "X-Forwarded-Proto X-Forwarded-Host X-Forwarded-Port"
            - name: OIDC_REMOTE_USER_CLAIM
              value: {{ .Values.oidc.remoteUserClaim | default "preferred_username" | quote }}
            - name: OIDC_SCOPES
              value: {{ .Values.oidc.scopes | default "openid profile email" | quote }}
            {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: freshrss-data
          persistentVolumeClaim:
            claimName: freshrss-data-pvc
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
