apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-nfs-pv
  labels:
    role: jellyfin-media
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.1.82
    path: /mnt/jellyfin-media
