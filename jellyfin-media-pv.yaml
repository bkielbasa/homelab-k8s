apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-nfs-pv
  labels:
    role: jellyfin-media
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=2
    - noresvport
  nfs:
    server: 192.168.1.148
    path: /jellyfin-media
