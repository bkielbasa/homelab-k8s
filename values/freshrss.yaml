image:
  repository: freshrss/freshrss
  pullPolicy: IfNotPresent
  tag: "1.27.1"

# SSO via Authentik. clientSecret is sourced from the freshrss-oidc Secret, which
# External Secrets syncs from Vault (secret/freshrss/oidc). See freshrss-vault.tf.
oidc:
  enabled: true
  providerMetadataUrl: "https://authentik.klimczak.xyz/application/o/freshrss/.well-known/openid-configuration"
  clientId: "freshrss"
  secretName: freshrss-oidc
  secretKey: clientSecret
  remoteUserClaim: "preferred_username"
  scopes: "openid profile email"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod-dns"
  hosts:
    - host: rss.klimczak.xyz
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - rss.klimczak.xyz
      secretName: rss-tls
