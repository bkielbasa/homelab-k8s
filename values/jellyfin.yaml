image:
  repository: docker.io/jellyfin/jellyfin
  pullPolicy: IfNotPresent
  # tag intentionally empty — chart uses appVersion (10.11.8)

nodeSelector:
  kubernetes.io/hostname: "laptop"

podSecurityContext:
  supplementalGroups:
    - 993   # host render group GID on the laptop node (verified via kubectl debug)

securityContext:
  privileged: true   # required for /dev/dri ioctl access on this kernel/cgroup config;
                     # without it libva fails with "No VA display found" even with the
                     # render group + hostPath mount. Acceptable for a single-tenant
                     # homelab transcoder. The min-privilege alternative is the Intel
                     # device plugin, which we can adopt later if needed.

volumes:
  - name: dri
    hostPath:
      path: /dev/dri
      type: Directory

volumeMounts:
  - name: dri
    mountPath: /dev/dri

persistence:
  config:
    enabled: true
    existingClaim: jellyfin-config-qnap
  media:
    enabled: true
    type: pvc
    existingClaim: jellyfin-media
  cache:
    enabled: false   # use the pod's emptyDir at /cache (chart default when disabled)

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 4000m
    memory: 4Gi

startupProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 60   # 10m max startup; first DB scan can be slow

# Library scans block /health long enough to fail the chart's default
# 1s-timeout probe, which restarts the pod mid-scan and corrupts library state.
livenessProbe:
  httpGet:
    path: /health
    port: http
  timeoutSeconds: 10
  periodSeconds: 30
  failureThreshold: 5
readinessProbe:
  httpGet:
    path: /health
    port: http
  timeoutSeconds: 10
  periodSeconds: 30
  failureThreshold: 3

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod-dns"
  hosts:
    - host: media.klimczak.xyz
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - media.klimczak.xyz
      secretName: media-tls
