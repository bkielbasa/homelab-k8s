metrics:
  enabled: true

server:
  affinity: ""
  # AWS credentials for the awskms seal stanza. Bootstrap-stable secret
  # managed by Terraform (vault-unseal.tf) — not sourced from Vault itself,
  # since Vault is sealed when these are needed.
  extraSecretEnvironmentVars:
    - envName: AWS_ACCESS_KEY_ID
      secretName: vault-unseal-aws
      secretKey: AWS_ACCESS_KEY_ID
    - envName: AWS_SECRET_ACCESS_KEY
      secretName: vault-unseal-aws
      secretKey: AWS_SECRET_ACCESS_KEY
  livenessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true"
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  ha:
    enabled: true
    replicas: 2
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        
        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        
        storage "raft" {
          path = "/vault/data"
        }

        # AWS KMS auto-unseal. After the one-time seal migration, pods
        # restart unattended — no Shamir keys needed for unsealing.
        seal "awskms" {
          region     = "eu-central-1"
          kms_key_id = "alias/homelab-vault-unseal"
        }

        service_registration "kubernetes" {}
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: local-path-mini
    accessMode: ReadWriteOnce

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns"
    hosts:
      - host: vault.klimczak.xyz
        paths:
          - /
    tls:
      - hosts:
          - vault.klimczak.xyz
        secretName: vault-tls
ui:
  enabled: true

