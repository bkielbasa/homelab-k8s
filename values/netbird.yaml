# NetBird Helm values, adapted from the chart's examples/nginx-ingress/authentik/values.yaml
# Chart: netbirdio/netbird 1.9.0, app version 0.46.0
# Configuration is a JSON ConfigMap with {{ .ENV_VAR }} substitution from secrets.

fullnameOverride: netbird

management:
  configmap: |-
    {
      "Stuns": [],
      "TURNConfig": {
        "TimeBasedCredentials": false,
        "CredentialsTTL": "12h0m0s",
        "Secret": "secret",
        "Turns": []
      },
      "Relay": {
        "Addresses": ["rels://netbird.klimczak.xyz:443/relay"],
        "CredentialsTTL": "24h",
        "Secret": "{{ .RELAY_PASSWORD }}"
      },
      "Signal": {
        "Proto": "https",
        "URI": "netbird.klimczak.xyz:443",
        "Username": "",
        "Password": ""
      },
      "Datadir": "/var/lib/netbird/",
      "DataStoreEncryptionKey": "{{ .DATASTORE_ENCRYPTION_KEY }}",
      "HttpConfig": {
        "LetsEncryptDomain": "",
        "CertFile": "",
        "CertKey": "",
        "AuthAudience": "{{ .IDP_CLIENT_ID }}",
        "AuthIssuer": "https://authentik.klimczak.xyz/application/o/netbird/",
        "AuthUserIDClaim": "",
        "AuthKeysLocation": "https://authentik.klimczak.xyz/application/o/netbird/jwks/",
        "OIDCConfigEndpoint": "https://authentik.klimczak.xyz/application/o/netbird/.well-known/openid-configuration",
        "IdpSignKeyRefreshEnabled": false
      },
      "IdpManagerConfig": {
        "ManagerType": "authentik",
        "ClientConfig": {
          "Issuer": "https://authentik.klimczak.xyz/application/o/netbird",
          "TokenEndpoint": "https://authentik.klimczak.xyz/application/o/token/",
          "ClientID": "{{ .IDP_CLIENT_ID }}",
          "ClientSecret": "",
          "GrantType": "client_credentials",
          "Scope": "goauthentik.io/api"
        },
        "ExtraConfig": {
          "Password": "{{ .IDP_SERVICE_ACCOUNT_PASSWORD }}",
          "Username": "{{ .IDP_SERVICE_ACCOUNT_USER }}"
        },
        "Auth0ClientCredentials": null,
        "AzureClientCredentials": null,
        "KeycloakClientCredentials": null,
        "ZitadelClientCredentials": null
      },
      "DeviceAuthorizationFlow": {
        "Provider": "hosted",
        "ProviderConfig": {
          "ClientID": "{{ .IDP_CLIENT_ID }}",
          "ClientSecret": "",
          "Domain": "authentik.klimczak.xyz",
          "Audience": "{{ .IDP_CLIENT_ID }}",
          "TokenEndpoint": "https://authentik.klimczak.xyz/application/o/token/",
          "DeviceAuthEndpoint": "https://authentik.klimczak.xyz/application/o/device/",
          "AuthorizationEndpoint": "",
          "Scope": "openid",
          "UseIDToken": false,
          "RedirectURLs": null
        }
      },
      "PKCEAuthorizationFlow": {
        "ProviderConfig": {
          "ClientID": "{{ .IDP_CLIENT_ID }}",
          "ClientSecret": "",
          "Domain": "",
          "Audience": "{{ .IDP_CLIENT_ID }}",
          "TokenEndpoint": "https://authentik.klimczak.xyz/application/o/token/",
          "DeviceAuthEndpoint": "",
          "AuthorizationEndpoint": "https://authentik.klimczak.xyz/application/o/authorize/",
          "Scope": "openid profile email offline_access api groups",
          "UseIDToken": false,
          "DisablePromptLogin": true,
          "RedirectURLs": ["http://localhost:53000"]
        }
      },
      "StoreConfig": {
        "Engine": "postgres"
      },
      "ReverseProxy": {
        "TrustedHTTPProxies": null,
        "TrustedHTTPProxiesCount": 0,
        "TrustedPeers": null
      }
    }

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod-dns
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: netbird.klimczak.xyz
        paths:
          - path: /api
            pathType: ImplementationSpecific
    tls:
      - secretName: netbird-api-tls
        hosts:
          - netbird.klimczak.xyz

  ingressGrpc:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod-dns
      nginx.ingress.kubernetes.io/backend-protocol: GRPC
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts:
      - host: netbird.klimczak.xyz
        paths:
          - path: /management.ManagementService
            pathType: ImplementationSpecific
    tls:
      - secretName: netbird-grpc-tls
        hosts:
          - netbird.klimczak.xyz

  persistentVolume:
    enabled: false

  envFromSecret:
    NETBIRD_STORE_ENGINE_POSTGRES_DSN: netbird-datastore/postgresDSN
    DATASTORE_ENCRYPTION_KEY: netbird-datastore/datastoreEncryptionKey
    RELAY_PASSWORD: netbird-relay/relayPassword
    IDP_CLIENT_ID: netbird-idp/idpClientID
    IDP_SERVICE_ACCOUNT_USER: netbird-idp/idpServiceAccountUser
    IDP_SERVICE_ACCOUNT_PASSWORD: netbird-idp/idpServiceAccountPassword

  useBackwardsGrpcService: true

signal:
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod-dns
      nginx.ingress.kubernetes.io/backend-protocol: GRPC
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts:
      - host: netbird.klimczak.xyz
        paths:
          - path: /signalexchange.SignalExchange
            pathType: ImplementationSpecific
    tls:
      - secretName: netbird-signal-tls
        hosts:
          - netbird.klimczak.xyz

relay:
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod-dns
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: netbird.klimczak.xyz
        paths:
          - path: /relay
            pathType: ImplementationSpecific
    tls:
      - secretName: netbird-relay-tls
        hosts:
          - netbird.klimczak.xyz

  envFromSecret:
    NB_AUTH_SECRET: netbird-relay/relayPassword

  env:
    NB_LOG_LEVEL: info
    NB_LISTEN_ADDRESS: ":33080"
    NB_EXPOSED_ADDRESS: rels://netbird.klimczak.xyz:443/relay

dashboard:
  enabled: true
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod-dns
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: netbird.klimczak.xyz
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: netbird-dashboard-tls
        hosts:
          - netbird.klimczak.xyz
  env:
    NETBIRD_MGMT_API_ENDPOINT: https://netbird.klimczak.xyz:443
    NETBIRD_MGMT_GRPC_API_ENDPOINT: https://netbird.klimczak.xyz:443
    AUTH_AUTHORITY: https://authentik.klimczak.xyz/application/o/netbird/
    USE_AUTH0: false
    AUTH_SUPPORTED_SCOPES: openid profile email offline_access api groups
    NETBIRD_TOKEN_SOURCE: accessToken

  envFromSecret:
    AUTH_CLIENT_ID: netbird-idp/idpClientID
    AUTH_AUDIENCE: netbird-idp/idpClientID
    # Authentik client_type=confidential requires the dashboard to send
    # client_secret on PKCE token exchange. The secret ends up in
    # browser-side JS so its confidentiality is weak by design — security
    # still relies on the netbird-users group policy binding.
    AUTH_CLIENT_SECRET: netbird-idp/idpClientSecret
