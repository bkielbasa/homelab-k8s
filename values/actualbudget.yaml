persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 5Gi

# SSO via Authentik. clientSecret is injected at apply time via
# helm_release.set_sensitive in actualbudget.tf (sourced from
# authentik_provider_oauth2.actualbudget.client_secret).
# enforce=false keeps password login as a fallback in case OIDC breaks.
login:
  method: openid
  allowedLoginMethods:
    - password
    - openid
  openid:
    enforce: false
    providerName: "Authentik"
    discoveryUrl: "https://authentik.klimczak.xyz/application/o/actualbudget/.well-known/openid-configuration"
    clientId: "actualbudget"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    cert-manager.io/cluster-issuer: "letsencrypt-prod-dns"
  hosts:
    - host: budget.klimczak.xyz
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - budget.klimczak.xyz
      secretName: actualbudget-tls
