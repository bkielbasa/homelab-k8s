config:
  inCluster: true
  baseURL: ""

serviceAccount:
  create: true
  name: "headlamp"

clusterRoleBinding:
  create: true
  clusterRoleName: cluster-admin

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-dns
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Authentik forward-auth — gates access at the ingress before traffic
    # reaches the headlamp pod. The embedded outpost (running inside the
    # Authentik server process) handles auth via the proxy provider.
    # Note: using the authentik-server ClusterIP directly because the
    # nginx-ingress controller runs with hostNetwork=true and uses the node's
    # external DNS (1.1.1.1/8.8.8.8) which can't resolve cluster-internal FQDNs.
    nginx.ingress.kubernetes.io/auth-url: "http://10.110.96.28/outpost.goauthentik.io/auth/nginx"
    nginx.ingress.kubernetes.io/auth-signin: "https://authentik.klimczak.xyz/outpost.goauthentik.io/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Forwarded-Host $http_host;
  hosts:
    - host: headlamp.klimczak.xyz
      paths:
        - path: /
          type: Prefix
  tls:
    - hosts:
        - headlamp.klimczak.xyz
      secretName: headlamp-tls

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
