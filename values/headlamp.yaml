config:
  inCluster: true
  baseURL: ""
  # OIDC: tokens issued by the Authentik "kubernetes" provider are accepted by
  # kube-apiserver (configured with --oidc-issuer-url etc). User signs in via
  # Authentik, Headlamp gets an id_token, uses it as the bearer to k8s API.
  # No more manual SA-token paste — kube-apiserver authorizes via the
  # ClusterRoleBinding mapping oidc:kubernetes-admins -> cluster-admin.
  oidc:
    secret:
      create: true
      name: headlamp-k8s-oidc
    clientID: "kubernetes"
    # clientSecret injected via helm_release set_sensitive
    issuerURL: "https://authentik.klimczak.xyz/application/o/kubernetes/"
    scopes: "openid profile email groups offline_access"
    callbackURL: "https://headlamp.klimczak.xyz/oidc-callback"
    validatorClientID: "kubernetes"
    validatorIssuerURL: "https://authentik.klimczak.xyz/application/o/kubernetes/"

serviceAccount:
  create: true
  name: "headlamp"

clusterRoleBinding:
  create: true
  clusterRoleName: cluster-admin

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-dns
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Authentik forward-auth — gates access at the ingress before traffic
    # reaches the headlamp pod. The embedded outpost (running inside the
    # Authentik server process) handles auth via the proxy provider.
    # Note: using the authentik-server ClusterIP directly because the
    # nginx-ingress controller runs with hostNetwork=true and uses the node's
    # external DNS (1.1.1.1/8.8.8.8) which can't resolve cluster-internal FQDNs.
    nginx.ingress.kubernetes.io/auth-url: "http://10.110.96.28/outpost.goauthentik.io/auth/nginx"
    nginx.ingress.kubernetes.io/auth-signin: "https://headlamp.klimczak.xyz/outpost.goauthentik.io/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Forwarded-Host $http_host;
  hosts:
    - host: headlamp.klimczak.xyz
      paths:
        - path: /
          type: Prefix
  tls:
    - hosts:
        - headlamp.klimczak.xyz
      secretName: headlamp-tls

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
