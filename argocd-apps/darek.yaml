apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: darek
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: darek
  # Chart + root-level values/ via $values (values file lives outside the chart dir).
  sources:
    - repoURL: https://github.com/bkielbasa/homelab-k8s
      targetRevision: master
      path: helm/darek
      helm:
        valueFiles:
          - $values/values/darek.yaml
    - repoURL: https://github.com/bkielbasa/homelab-k8s
      targetRevision: master
      ref: values
  # Adoption verified clean; prune-safe (TF-managed ESO/SecretStore carry no
  # app.kubernetes.io/instance label, CronJob-owned Jobs are skipped). Argo now
  # has full control. NOTE: with selfHeal on, darek image bumps must go through
  # git (commit values/darek.yaml) — out-of-band kubectl/helm changes get reverted.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
