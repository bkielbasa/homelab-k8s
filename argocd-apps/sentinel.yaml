apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentinel
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: sentinel
  # Chart + root-level values/ via $values (values file lives outside the chart dir).
  sources:
    - repoURL: https://github.com/bkielbasa/homelab-k8s
      targetRevision: master
      path: helm/sentinel-sre
      helm:
        valueFiles:
          - $values/values/sentinel-sre.yaml
    - repoURL: https://github.com/bkielbasa/homelab-k8s
      targetRevision: master
      ref: values
  # Adoption verified clean; prune-safe (TF-managed ESO/SecretStore carry no
  # app.kubernetes.io/instance label). Argo now has full control.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
